// ==================== 54因素综合评分 ====================
function calc54Factors(home, away, matchDate){
  var d1=getTeamData(home), d2=getTeamData(away);
  var en1=NAME_MAP[home]||home, en2=NAME_MAP[away]||away;
  var v1=VENUES[en1]||VENUES['default'], v2=VENUES[en2]||VENUES['default'];

  // 一、硬实力 25%
  var f_star=scoreCompare(d1.star,d2.star,25);
  var age1=Math.max(0,100-Math.abs(d1.age-27.5)*15), age2=Math.max(0,100-Math.abs(d2.age-27.5)*15);
  var f_age=scoreCompare(age1,age2,6);
  var f_lg=scoreCompare(d1.lg,d2.lg,10);
  var f_gk=scoreCompare(d1.gk,d2.gk,8);
  var f_exp=scoreCompare(d1.exp,d2.exp,8);
  var phys1=Math.min(100,(d1.ht-170)*1.5+20), phys2=Math.min(100,(d2.ht-170)*1.5+20);
  var f_phys=scoreCompare(phys1,phys2,5);
  var f_yth=scoreCompare(d1.yth,d2.yth,5);
  var hardTotal=f_star+f_age+f_lg+f_gk+f_exp+f_phys+f_yth;
  var hardScore=50+(hardTotal/67)*50;

  // 二、战术教练 15%
  var f_coach=scoreCompare(d1.coach,d2.coach,7);
  var f_tact=scoreCompare(d1.tact,d2.tact,8);
  var f_setp=scoreCompare(d1.setp,d2.setp,4);
  var f_style=calcStyleBonus(d1.style,d2.style);
  var coachScore=50+((f_coach+f_tact+f_setp+f_style)/22)*50;

  // 三、赛程环境 10%
  var f_homeAdv=scoreCompare(v1.home*3,v2.home*3,12);
  var altDiff=Math.abs(v1.alt-v2.alt), altPen=altDiff>1000?-8:(altDiff>500?-4:0);
  var envScore=50+f_homeAdv+altPen;

  // 四、伤病 5% - 中性
  var injScore=50;

  // 五、心理 10%
  var h2hB=getH2HBonus(en1,en2);
  var wcDiff=d1.wcH-d2.wcH, wcB=wcDiff>30?6:(wcDiff>10?3:(wcDiff<-30?-6:(wcDiff<-10?-3:0)));
  var pressB=(d2.r-d1.r)/5;
  var psychScore=50+h2hB+wcB+pressB;

  // 六、数据 15%
  var f_form=scoreCompare(getFormScore(home),getFormScore(away),8);
  var rankB=(d2.r-d1.r)/50*7;
  var dataScore=50+f_form+rankB;

  // 七、次要 10%
  var gamesHome=0,gamesAway=0;for(var i=0;i<MATCHES.length;i++){if(MATCHES[i].st==='done'){if(MATCHES[i].h===home||MATCHES[i].a===home)gamesHome++;if(MATCHES[i].h===away||MATCHES[i].a===away)gamesAway++;}}
  var fatHome=gamesHome>=2?-4:(gamesHome>=1?-1:0),fatAway=gamesAway>=2?-4:(gamesAway>=1?-1:0);
  var minorScore=50+fatHome-fatAway;

  // 八、随机 10%
  var randScore=50;

  var comp=hardScore*0.25+coachScore*0.15+envScore*0.10+injScore*0.05+psychScore*0.10+dataScore*0.15+minorScore*0.10+randScore*0.10;
  comp=Math.round(Math.max(5,Math.min(95,comp)));

  var wp=Math.round(comp), lp=Math.round((100-comp)*0.75), dp=100-wp-lp;
  if(dp<8){dp=8;lp=100-wp-dp;}if(wp<8){wp=8;dp=100-wp-lp;}if(lp<8){lp=8;dp=100-wp-lp;}

  var goals=calcGoals(d1,d2,v1,v2,home,away);

  return{win:wp,draw:dp,lose:lp,goals:goals,composite:comp,
    breakdown:{
      hard:{score:Math.round(hardScore),weight:25,items:[
        {n:'1.球星+深度',v:Math.round(50+f_star/25*50)},{n:'3.年龄结构',v:Math.round(age1>age2?55+age1/4:45+age1/4)},
        {n:'4.联赛强度',v:Math.round(50+f_lg/10*50)},{n:'5.门将',v:Math.round(50+f_gk/8*50)},
        {n:'6.大赛经验',v:Math.round(50+f_exp/8*50)},{n:'7.身体天赋',v:Math.round(phys1>phys2?52:48)},{n:'2/8.阵容深度+潜力',v:Math.round(50+f_yth/5*50)}]},
      coach:{score:Math.round(coachScore),weight:15,items:[
        {n:'9.教练履历',v:Math.round(50+f_coach/7*50)},{n:'10.战术磨合',v:Math.round(50+f_tact/8*50)},
        {n:'13.战术克制',v:Math.round(50+f_style/3*50)},{n:'12.定位球',v:Math.round(50+f_setp/4*50)}]},
      env:{score:Math.round(envScore),weight:10,items:[
        {n:'20.东道主优势',v:Math.round(50+f_homeAdv/12*50)},{n:'18.海拔/气候',v:Math.round(50+altPen)},{n:'21.累积疲劳',v:Math.round(50+fatHome-fatAway)}]},
      psych:{score:Math.round(psychScore),weight:10,items:[
        {n:'29.H2H心理',v:Math.round(50+h2hB)},{n:'35.WC历史',v:Math.round(50+wcB)},{n:'28.强弱心态',v:Math.round(50+pressB)}]},
      data:{score:Math.round(dataScore),weight:15,items:[
        {n:'32.近期数据',v:Math.round(50+f_form/8*50)},{n:'33.排名差距',v:Math.round(50+rankB/7*50)}]}
    }};
}

function calcGoals(d1,d2,v1,v2,home,away){
  var atk1=d1.star/50*1.3,atk2=d2.star/50*1.3;
  var def1=(100-d1.gk)/50*0.8+0.6,def2=(100-d2.gk)/50*0.8+0.6;
  var homeBonus=(v1.home-v2.home)/200+1;
  var f1=getFormScore(home)/50,f2=getFormScore(away)/50;
  var x1=1.2*atk1*def2*f1*homeBonus,x2=1.2*atk2*def1*f2/homeBonus;
  x1=Math.round(Math.min(5,Math.max(0.15,x1))*10)/10;
  x2=Math.round(Math.min(5,Math.max(0.15,x2))*10)/10;

  // 前5最可能比分
  var allScores=[];
  for(var i=0;i<=6;i++){for(var j=0;j<=6;j++){var pr=poisson(i,x1)*poisson(j,x2);allScores.push({s:i+'-'+j,p:pr});}}
  allScores.sort(function(a,b){return b.p-a.p;});
  var top5=allScores.slice(0,5);
  var best=top5[0];

  var tot=x1+x2,over=Math.round((1-poissonCDF(2,tot))*100);
  return{xgHome:x1,xgAway:x2,predHome:parseInt(best.s.split('-')[0]),predAway:parseInt(best.s.split('-')[1]),totalXG:Math.round(tot*10)/10,over25:over,under25:100-over,bestScore:best.s,bestProb:Math.round(best.p*100),top5Scores:top5.map(function(x){return{s:x.s,p:Math.round(x.p*1000)/10};})};
}

function poisson(k,lambda){if(k<0||lambda<0)return 0;if(lambda===0)return k===0?1:0;var r=Math.exp(-lambda);for(var i=1;i<=k;i++)r*=lambda/i;return r;}
function poissonCDF(k,lambda){var s=0;for(var i=0;i<=k;i++)s+=poisson(i,lambda);return Math.min(1,Math.max(0,s));}
function poissonRand(lambda){var L=Math.exp(-lambda),k=0,p=1;while(p>L){k++;p*=Math.random();}return k-1;}

function calcOdds(prob, goals, hteam, ateam){
  // 胜平负概率 → 欧赔（模型赔率）
  var homeOdds=prob.win>0?(100/prob.win).toFixed(2):'99';
  var drawOdds=prob.draw>0?(100/prob.draw).toFixed(2):'99';
  var awayOdds=prob.lose>0?(100/prob.lose).toFixed(2):'99';

  // 模拟外围市场赔率（在模型赔率基础上加5-8%抽水）
  var vig=1.06;
  var mktHome=(parseFloat(homeOdds)*vig).toFixed(2);
  var mktDraw=(parseFloat(drawOdds)*vig).toFixed(2);
  var mktAway=(parseFloat(awayOdds)*vig).toFixed(2);

  // 价值检测：模型赔率 vs 市场赔率
  var valueSide='', valuePct=0;
  var vh=(parseFloat(mktHome)-parseFloat(homeOdds))/parseFloat(homeOdds)*100;
  var va=(parseFloat(mktAway)-parseFloat(awayOdds))/parseFloat(awayOdds)*100;
  if(vh>8){valueSide='主胜价值';valuePct=Math.round(vh);}
  else if(va>8){valueSide='客胜价值';valuePct=Math.round(va);}
  else valueSide='无明显价值';

  // 亚盘估算
  var diff=prob.win-prob.lose;
  var asianHcap='', upperSide='', lowerSide='';
  if(diff>55){asianHcap=hteam+' -2';upperSide=hteam;lowerSide=ateam;}
  else if(diff>38){asianHcap=hteam+' -1.5';upperSide=hteam;lowerSide=ateam;}
  else if(diff>22){asianHcap=hteam+' -1';upperSide=hteam;lowerSide=ateam;}
  else if(diff>12){asianHcap=hteam+' -0.5';upperSide=hteam;lowerSide=ateam;}
  else if(diff>5){asianHcap=hteam+' -0/0.5';upperSide=hteam;lowerSide=ateam;}
  else if(diff>-5){asianHcap='平手';upperSide='平手';lowerSide='平手';}
  else if(diff>-12){asianHcap=ateam+' -0/0.5';upperSide=ateam;lowerSide=hteam;}
  else if(diff>-22){asianHcap=ateam+' -0.5';upperSide=ateam;lowerSide=hteam;}
  else if(diff>-38){asianHcap=ateam+' -1';upperSide=ateam;lowerSide=hteam;}
  else if(diff>-55){asianHcap=ateam+' -1.5';upperSide=ateam;lowerSide=hteam;}
  else{asianHcap=ateam+' -2';upperSide=ateam;lowerSide=hteam;}

  // 上下盘分析
  var upperProb, lowerProb;
  if(upperSide===hteam){upperProb=prob.win;lowerProb=prob.draw+prob.lose;}
  else if(upperSide===ateam){upperProb=prob.lose;lowerProb=prob.win+prob.draw;}
  else{upperProb=prob.win+prob.lose;lowerProb=prob.draw;}

  var upperWinProb=Math.round(upperProb), lowerWinProb=Math.round(lowerProb);
  var upperOddsVal=(100/upperWinProb).toFixed(2), lowerOddsVal=(100/lowerWinProb).toFixed(2);

  // 大小球
  var ouLine=goals.totalXG>3.5?'大3.5':(goals.totalXG>3?'大3':(goals.totalXG>2.5?'大2.5':'大2'));
  var ouProb=goals.totalXG>2.5?goals.over25+'%大':goals.under25+'%小';
  var overPct=goals.over25, underPct=goals.under25;

  return{
    homeOdds:homeOdds,drawOdds:drawOdds,awayOdds:awayOdds,
    mktHome:mktHome,mktDraw:mktDraw,mktAway:mktAway,
    valueSide:valueSide,valuePct:valuePct,
    asianHcap:asianHcap,upperSide:upperSide,lowerSide:lowerSide,
    upperProb:upperWinProb,lowerProb:lowerWinProb,upperOdds:upperOddsVal,lowerOdds:lowerOddsVal,
    ouLine:ouLine,ouProb:ouProb,overPct:overPct,underPct:underPct,
    diff:diff
  };
}

// ==================== 蒙特卡洛 ====================
var mcResults=null;
function getAllTeams(){var t=[];for(var g in GROUPS){for(var i=0;i<GROUPS[g].length;i++)t.push({name:GROUPS[g][i],group:g});}return t;}
function runOneSim(){
  var tbl={};for(var g in GROUPS){tbl[g]={};for(var i=0;i<GROUPS[g].length;i++)tbl[g][GROUPS[g][i]]={p:0,w:0,d:0,l:0,gf:0,ga:0};}
  for(var i=0;i<MATCHES.length;i++){var m=MATCHES[i];if(m.st==='done'){var hs=m.hs,as=m.as;if(tbl[m.g]&&tbl[m.g][m.h]&&tbl[m.g][m.a]){tbl[m.g][m.h].gf+=hs;tbl[m.g][m.h].ga+=as;tbl[m.g][m.a].gf+=as;tbl[m.g][m.a].ga+=hs;if(hs>as){tbl[m.g][m.h].w++;tbl[m.g][m.h].p+=3;tbl[m.g][m.a].l++;}else if(as>hs){tbl[m.g][m.a].w++;tbl[m.g][m.a].p+=3;tbl[m.g][m.h].l++;}else{tbl[m.g][m.h].d++;tbl[m.g][m.h].p++;tbl[m.g][m.a].d++;tbl[m.g][m.a].p++;}}}}
  var rem=[];for(var i=0;i<MATCHES.length;i++){if(MATCHES[i].st!=='done')rem.push(MATCHES[i]);}
  for(var i=0;i<rem.length;i++){var m=rem[i];var d1=getTeamData(m.h),d2=getTeamData(m.a);var atk1=d1.star/50*1.2,atk2=d2.star/50*1.2;var def1=(100-d1.gk)/50*0.8+0.6,def2=(100-d2.gk)/50*0.8+0.6;var x1=1.2*atk1*def2,x2=1.2*atk2*def1;x1=Math.max(0.15,x1);x2=Math.max(0.15,x2);var g1=poissonRand(x1),g2=poissonRand(x2);if(tbl[m.g]&&tbl[m.g][m.h]&&tbl[m.g][m.a]){tbl[m.g][m.h].gf+=g1;tbl[m.g][m.h].ga+=g2;tbl[m.g][m.a].gf+=g2;tbl[m.g][m.a].ga+=g1;if(g1>g2){tbl[m.g][m.h].w++;tbl[m.g][m.h].p+=3;tbl[m.g][m.a].l++;}else if(g2>g1){tbl[m.g][m.a].w++;tbl[m.g][m.a].p+=3;tbl[m.g][m.h].l++;}else{tbl[m.g][m.h].d++;tbl[m.g][m.h].p++;tbl[m.g][m.a].d++;tbl[m.g][m.a].p++;}}}
  var go={};for(var g in tbl){var arr=[];for(var t in tbl[g]){var st=tbl[g][t];st.gd=st.gf-st.ga;arr.push({name:t,stats:st});}arr.sort(function(a,b){if(b.stats.p!==a.stats.p)return b.stats.p-a.stats.p;if(b.stats.gd!==a.stats.gd)return b.stats.gd-a.stats.gd;return b.stats.gf-a.stats.gf;});go[g]=arr;}
  var q=[],tp=[];for(var g in go){var a=go[g];q.push({name:a[0].name,group:g,pos:1});q.push({name:a[1].name,group:g,pos:2});tp.push({name:a[2].name,group:g,stats:a[2].stats});}
  tp.sort(function(a,b){if(b.stats.p!==a.stats.p)return b.stats.p-a.stats.p;if(b.stats.gd!==a.stats.gd)return b.stats.gd-a.stats.gd;return b.stats.gf-a.stats.gf;});
  for(var i=0;i<8;i++)q.push({name:tp[i].name,group:tp[i].group,pos:3});
  var rt=q.slice();
  while(rt.length>1){var w=[];for(var i=0;i<rt.length;i+=2){var d1=getTeamData(rt[i].name),d2=getTeamData(rt[i+1].name);var s1=d1.star*0.65+d1.coach*0.15+d1.exp*0.1+d1.gk*0.1,s2=d2.star*0.65+d2.coach*0.15+d2.exp*0.1+d2.gk*0.1;s1*=0.75+Math.random()*0.5;s2*=0.75+Math.random()*0.5;w.push(s1>s2?rt[i]:rt[i+1]);}rt=w;}
  return{winner:rt[0].name,qualified:q};
}
function runMonteCarlo(iter,pc){
  var teams=getAllTeams(),cnt={};for(var i=0;i<teams.length;i++)cnt[teams[i].name]={adv:0,qf:0,sf:0,fn:0,win:0};
  for(var i=0;i<iter;i++){var r=runOneSim();for(var j=0;j<r.qualified.length;j++)cnt[r.qualified[j].name].adv++;
    var q=r.qualified.slice(),r16=simKO(q);for(var j=0;j<r16.length;j++)cnt[r16[j].name].qf++;
    var r8=simKO(r16);for(var j=0;j<r8.length;j++)cnt[r8[j].name].sf++;
    var r4=simKO(r8);for(var j=0;j<r4.length;j++)cnt[r4[j].name].fn++;
    var r2=simKO(r4);cnt[r2[0].name].win++;if(pc&&i%200===0)pc(i);}
  var p=[];for(var t in cnt){var c=cnt[t];p.push({name:t,adv:Math.round(c.adv/iter*1000)/10,qf:Math.round(c.qf/iter*1000)/10,sf:Math.round(c.sf/iter*1000)/10,fn:Math.round(c.fn/iter*1000)/10,win:c.win/iter*100});}
  p.sort(function(a,b){return b.win-a.win;});return p;
}
function simKO(teams){var w=[];for(var i=0;i<teams.length;i+=2){var d1=getTeamData(teams[i].name),d2=getTeamData(teams[i+1].name);var s1=d1.star*0.65+d1.coach*0.15+d1.exp*0.1+d1.gk*0.1,s2=d2.star*0.65+d2.coach*0.15+d2.exp*0.1+d2.gk*0.1;s1*=0.7+Math.random()*0.6;s2*=0.7+Math.random()*0.6;w.push(s1>s2?teams[i]:teams[i+1]);}return w;}

function renderMonteCarlo(){
  var h='<div class="card"><div class="sec">🎲 蒙特卡洛仿真</div><div style="font-size:12px;color:#aaa;line-height:1.8;margin-bottom:8px">基于<b style="color:#ffb020">54因素模型</b>评分 → 泊松进球模拟 → <b style="color:#6c5ce7">万次完整杯赛</b>仿真 → 统计各阶段晋级概率</div><div class="mcctrl"><span style="color:#888;font-size:12px">次数：</span><input class="mciter" id="mcIter" type="number" value="5000" min="500" max="30000" step="500"><button class="btn btn-go" id="mcRunBtn">▶ 开始</button><span class="mcstatus" id="mcStatus"></span></div>';
  if(mcResults){
    h+='<div class="sec" style="font-size:14px;margin-top:14px">🏆 夺冠概率 TOP25</div><div style="font-size:10px;color:#555;margin-bottom:6px">Win=夺冠 | 决赛 | 四强 | 八强 | 出线</div>';
    for(var i=0;i<Math.min(25,mcResults.length);i++){var t=mcResults[i],g=i<3;h+='<div class="mcrow"><span class="mcrank'+(g?' gold':'')+'">'+(i+1)+'</span><span class="mcteam">'+(g?'⭐ ':'')+t.name+'</span><div class="mcbarw"><div class="mcbar" style="width:'+Math.max(2,t.win*6)+'%;background:linear-gradient(90deg,'+(g?'#ffb020':'#6c5ce7')+',#a78bfa)">'+(t.win>=1?t.win.toFixed(1)+'%':'')+'</div></div><span class="mcpct" style="color:'+(g?'#ffb020':'#6c5ce7')+'">'+(t.win<0.1?'<0.1':t.win.toFixed(1))+'%</span><span class="mcstat">决赛'+(t.fn<0.1?'<0.1':t.fn.toFixed(1))+'%·四强'+(t.sf<0.1?'<0.1':t.sf.toFixed(1))+'%·出线'+(t.adv<0.1?'<0.1':t.adv.toFixed(1))+'%</span></div>';}
  }
  h+='</div>';
  if(mcResults){
    h+='<div class="mcgrid">';var bg={};for(var g in GROUPS){bg[g]=[];}
    for(var i=0;i<mcResults.length;i++){var t=mcResults[i];for(var g in GROUPS)for(var j=0;j<GROUPS[g].length;j++)if(GROUPS[g][j]===t.name&&bg[g].length<4)bg[g].push(t);}
    for(var g in bg){if(bg[g].length===0)continue;bg[g].sort(function(a,b){return b.adv-a.adv;});h+='<div class="mccard"><h4>'+g+'组 出线概率</h4>';
      for(var i=0;i<bg[g].length;i++){var t=bg[g][i],c=t.adv>=70?'#6c5ce7':(t.adv>=30?'#a78bfa':'#555');h+='<div class="mcrow"><span class="mcrank'+(i<2?' gold':'')+'">'+(i+1)+'</span><span class="mcteam">'+t.name+'</span><div class="mcbarw"><div class="mcbar" style="width:'+Math.max(2,t.adv)+'%;background:'+c+'">'+(t.adv>=25?t.adv+'%':'')+'</div></div><span class="mcpct" style="color:'+c+'">'+t.adv+'%</span></div>';}
      h+='</div>';}
    h+='</div>';
  }
  document.getElementById('content').innerHTML=h;
  document.getElementById('mcRunBtn').addEventListener('click',function(){var iter=parseInt(document.getElementById('mcIter').value)||5000;iter=Math.max(100,Math.min(30000,iter));runMCSim(iter);});
}
function runMCSim(iter){
  var stEl=document.getElementById('mcStatus'),btn=document.getElementById('mcRunBtn');
  stEl.textContent='模拟中...';btn.disabled=true;
  setTimeout(function(){var st=Date.now();mcResults=runMonteCarlo(iter);var el=((Date.now()-st)/1000).toFixed(1);
    renderMonteCarlo();stEl.textContent='✅ '+iter+'次完成，'+el+'秒';btn.disabled=false;},50);
}
