<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 世界杯数据中心 | 实时赛程 · 胜率预测 · 积分榜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:#0a0e27;color:#e0e0e0;min-height:100vh;
}
.container{max-width:1100px;margin:0 auto;padding:16px}
.header{text-align:center;padding:28px 0 20px;background:linear-gradient(135deg,#1a1f3a,#0f1433);border-bottom:2px solid #2a2f4a;margin-bottom:20px}
.header h1{font-size:30px;color:#fff;margin-bottom:4px}
.header .sub{color:#888;font-size:13px}
.live-dot{display:inline-block;width:8px;height:8px;background:#ff3860;border-radius:50%;animation:pulse 1.5s infinite;margin-right:6px;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.tabs{display:flex;gap:4px;margin-bottom:20px;background:#111636;border-radius:12px;padding:4px}
.tab{flex:1;text-align:center;padding:10px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s;color:#888;user-select:none}
.tab:hover{color:#ccc}
.tab.on{background:#6c5ce7;color:#fff}

.card{background:#111636;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #1e2350}
.match-row{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid #1a1f40;gap:10px;flex-wrap:wrap}
.match-row:last-child{border-bottom:none}
.match-time{min-width:80px;font-size:12px;color:#888;text-align:center}
.match-group{min-width:40px;font-size:11px;color:#6c5ce7;font-weight:600;text-align:center}
.match-teams{flex:1;display:flex;align-items:center;justify-content:center;gap:12px;min-width:300px}
.team{font-size:15px;font-weight:600;color:#fff;min-width:100px}
.team.home{text-align:right}
.team.away{text-align:left}
.score{font-size:22px;font-weight:700;color:#fff;background:#1e2350;padding:6px 16px;border-radius:8px;min-width:80px;text-align:center}
.score.upcoming{color:#888;font-size:14px}
.flag{font-size:22px}

/* Goal prediction */
.goal-pred{
  display:flex;flex-direction:column;align-items:center;
  background:#0d1130;border-radius:8px;padding:6px 14px;
  margin-left:4px;border:1px solid #1e2350;
}
.gp-score{font-size:18px;font-weight:700;color:#ffb020;letter-spacing:2px}
.gp-label{font-size:10px;color:#666;margin-top:1px}

/* Probability detail */
.prob-cell{min-width:220px}
.prob-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.prob-label{font-size:10px;color:#aaa;width:28px;text-align:right;flex-shrink:0}
.prob-bar-wrap{flex:1;height:5px;background:#1e2350;border-radius:3px;overflow:hidden}
.prob-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.prob-bar-home{background:#6c5ce7}
.prob-bar-draw{background:#555}
.prob-bar-away{background:#ff3860}
.prob-pct{font-size:11px;width:32px;text-align:right;flex-shrink:0;font-weight:600}
.prob-pct.home-pct{color:#6c5ce7}
.prob-pct.draw-pct{color:#888}
.prob-pct.away-pct{color:#ff3860}

/* Factors breakdown */
.factors-pop{display:none;position:absolute;background:#1a1f40;border:1px solid #2a2f50;border-radius:10px;padding:14px;z-index:10;width:260px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.match-row:hover .factors-pop{display:block}
.factor-item{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid #1e2350}
.factor-item:last-child{border:none}
.factor-label{color:#aaa}
.factor-val{font-weight:600}
.factor-val.pos{color:#6c5ce7}
.factor-val.neg{color:#ff3860}
.factor-val.neutral{color:#888}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.badge-live{background:#ff3860;color:#fff}
.badge-done{background:#1e2350;color:#888}
.badge-up{background:#1a1f40;color:#6c5ce7}

table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;font-size:11px;color:#888;font-weight:500;border-bottom:1px solid #1e2350;text-transform:uppercase}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid #151a3a}
tr:hover td{background:rgba(108,92,231,.05)}
.team-cell{font-weight:500;color:#fff}
.pts{font-weight:700;color:#6c5ce7;font-size:15px}

.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.group-card{background:#111636;border-radius:12px;padding:16px;border:1px solid #1e2350}
.group-card h3{font-size:15px;color:#6c5ce7;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #1a1f40}
.group-card table{font-size:12px}
.group-card th{font-size:10px;padding:6px 8px}
.group-card td{padding:7px 8px;font-size:12px}

.period-bar{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px}
.period-btn{padding:8px 16px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #1e2350;background:transparent;color:#888;white-space:nowrap;transition:all .2s;font-family:inherit}
.period-btn:hover{border-color:#6c5ce7;color:#ccc}
.period-btn.on{background:#6c5ce7;color:#fff;border-color:#6c5ce7}

.section-title{font-size:16px;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.footer{text-align:center;padding:20px;color:#555;font-size:11px}
.footer span{color:#6c5ce7}

/* Detail panel */
.detail-panel{background:#111636;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #1e2350}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.factor-card{background:#0d1130;border-radius:10px;padding:14px;text-align:center;border:1px solid #1e2350}
.factor-card .fc-icon{font-size:28px;margin-bottom:6px}
.factor-card .fc-name{font-size:11px;color:#888;margin-bottom:4px}
.factor-card .fc-val{font-size:18px;font-weight:700;color:#fff}
.factor-card .fc-bar{height:4px;border-radius:2px;margin-top:8px;background:#1e2350;overflow:hidden}
.factor-card .fc-fill{height:100%;border-radius:2px;transition:width .5s}

/* form dots */
.form-dots{display:flex;gap:2px}
.form-dot{width:8px;height:8px;border-radius:50%}
.form-dot.w{background:#6c5ce7}
.form-dot.d{background:#888}
.form-dot.l{background:#ff3860}
.form-dot.p{background:#1e2350}

@media(max-width:640px){
  .match-row{flex-wrap:wrap}
  .match-time{width:100%;text-align:left}
  .match-teams{width:100%}
  .team{font-size:13px;min-width:auto}
  .groups-grid{grid-template-columns:1fr}
  .header h1{font-size:22px}
  .prob-cell{width:100%}
}

/* Monte Carlo */
.mc-bar-wrap{flex:1;height:22px;background:#1e2350;border-radius:6px;overflow:hidden;position:relative;min-width:100px}
.mc-bar-fill{height:100%;background:linear-gradient(90deg,#6c5ce7,#a78bfa);border-radius:6px;transition:width .6s;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap}
.mc-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #151a3a}
.mc-rank{width:30px;text-align:center;font-weight:700;color:#888;font-size:13px}
.mc-rank.top3{color:#ffb020}
.mc-team{width:140px;font-weight:500;color:#fff;font-size:13px}
.mc-pct{width:55px;text-align:right;font-weight:700;font-size:14px;color:#6c5ce7}
.mc-stats{font-size:10px;color:#888}
.mc-controls{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.mc-iter{width:80px;padding:8px 12px;border-radius:8px;border:1px solid #1e2350;background:#0d1130;color:#fff;font-size:13px;text-align:center;font-family:inherit}
.mc-status{font-size:12px;color:#888}
.mc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
.mc-card{background:#0d1130;border-radius:10px;padding:16px;border:1px solid #1e2350}
.mc-card h4{font-size:14px;color:#6c5ce7;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #1a1f40}
</style>

  // ===== 积分计算 =====
  function calcStandings(){
    var s={};
    for(var g in GROUPS){
      s[g]={};
      for(var i=0;i<GROUPS[g].length;i++)s[g][GROUPS[g][i]]={p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,form:[]};
    }
    for(var i=0;i<MATCHES.length;i++){
      var m=MATCHES[i];if(m.st!=='done')continue;
      var g=m.g;if(!s[g])continue;
      if(s[g][m.h]){s[g][m.h].gf+=m.hs;s[g][m.h].ga+=m.as;}
      if(s[g][m.a]){s[g][m.a].gf+=m.as;s[g][m.a].ga+=m.hs;}
      if(m.hs>m.as){
        if(s[g][m.h]){s[g][m.h].w++;s[g][m.h].p+=3;s[g][m.h].form.push('w');}
        if(s[g][m.a]){s[g][m.a].l++;s[g][m.a].form.push('l');}
      }else if(m.as>m.hs){
        if(s[g][m.a]){s[g][m.a].w++;s[g][m.a].p+=3;s[g][m.a].form.push('w');}
        if(s[g][m.h]){s[g][m.h].l++;s[g][m.h].form.push('l');}
      }else{
        if(s[g][m.h]){s[g][m.h].d++;s[g][m.h].p++;s[g][m.h].form.push('d');}
        if(s[g][m.a]){s[g][m.a].d++;s[g][m.a].p++;s[g][m.a].form.push('d');}
      }
    }
    for(var g in s){
      for(var t in s[g])s[g][t].gd=s[g][t].gf-s[g][t].ga;
      var arr=[];for(var t in s[g])arr.push({name:t,stats:s[g][t]});
      arr.sort(function(a,b){
        if(b.stats.p!==a.stats.p)return b.stats.p-a.stats.p;
        if(b.stats.gd!==a.stats.gd)return b.stats.gd-a.stats.gd;
        return b.stats.gf-a.stats.gf;
      });
      s[g]=arr;
    }
    return s;
  }

  // 获取球队近期状态得分 (基于本届世界杯已打比赛)
  function getFormScore(team){
    var standings=calcStandings();
    for(var g in standings){
      for(var i=0;i<standings[g].length;i++){
        if(standings[g][i].name===team){
          var st=standings[g][i].stats;
          if(st.form.length===0)return 50; // 还没打比赛
          var score=50;
          for(var j=0;j<st.form.length;j++){
            if(st.form[j]==='w')score+=15;
            else if(st.form[j]==='d')score+=5;
            else score-=10;
          }
          // 士气加成：净胜球
          score+=st.gd*2;
          return Math.max(10,Math.min(100,score));
        }
      }
    }
    return 50;
  }

  // 主场优势
  function getHomeAdvantage(team){
    var hosts=['USA','Mexico','Canada'];
    var en=NAME_MAP[team]||team;
    if(hosts.indexOf(en)>=0)return 8;
    // CONCACAF 球队在北美有轻微优势
    var conf=getConf(en);
    if(conf==='CONCACAF')return 3;
    return 0;
  }

  // 出线压力指数 (越接近小组赛末轮，积分越低，压力越大)
  function getPressureFactor(team, matchDate){
    var standings=calcStandings();
    var matchDay=new Date(matchDate);
    var tourneyStart=new Date('2026-06-11');
    var daysElapsed=(matchDay-tourneyStart)/(1000*86400);
    var matchday=Math.floor(daysElapsed/3)+1; // 大致第几轮

    for(var g in standings){
      for(var i=0;i<standings[g].length;i++){
        if(standings[g][i].name===team){
          var st=standings[g][i].stats;
          var gamesPlayed=st.w+st.d+st.l;
          if(matchday<=1||gamesPlayed===0)return 0; // 第一轮无压力

          if(matchday>=3||gamesPlayed>=2){
            // 第三轮，出线关键战
            if(i===2)return 12; // 排第3必须赢
            if(i===1)return 8;  // 排第2不稳
            if(i===0)return 3;  // 排第1已稳
          }
          // 第二轮
          if(gamesPlayed===1){
            if(st.l===1)return 10;  // 输了第一场，第二场必须赢
            if(st.d===1)return 5;   // 平了第一场，需要赢
            if(st.w===1)return -3;  // 赢了第一场，心态放松
          }
        }
      }
    }
    return 0;
  }

  // ===== 多维胜率计算 =====
  function calcWinProbMulti(team1, team2, matchDate){
    var en1=NAME_MAP[team1]||team1, en2=NAME_MAP[team2]||team2;
    var r1=getRank(en1), r2=getRank(en2);

    // 因子1：FIFA排名 (权重40%)
    var rankDiff=r2-r1;
    var eloScore=1/(1+Math.pow(10,(-rankDiff*20)/400));
    var rankFactor=eloScore*100;

    // 因子2：近期状态 (权重25%)
    var form1=getFormScore(team1), form2=getFormScore(team2);
    var formTotal=form1+form2||1;
    var formFactor=(form1/formTotal)*100;

    // 因子3：主场优势 (权重10%)
    var home1=getHomeAdvantage(team1), home2=getHomeAdvantage(team2);
    var homeBonus=home1-home2; // 正值=team1主场优势
    var homeFactor=50+homeBonus;

    // 因子4：洲际对抗 (权重15%)
    var conf1=CONF_STRENGTH[getConf(en1)]||75;
    var conf2=CONF_STRENGTH[getConf(en2)]||75;
    var confFactor=(conf1/(conf1+conf2))*100;

    // 因子5：出线压力 (权重10%)
    var press1=getPressureFactor(team1, matchDate);
    var press2=getPressureFactor(team2, matchDate);
    var pressBonus=press1-press2; // 正值=team1更有动力
    var pressFactor=50+pressBonus;

    // 加权综合
    var composite=rankFactor*0.40+formFactor*0.25+homeFactor*0.10+confFactor*0.15+pressFactor*0.10;
    composite=Math.round(composite);

    // 转换为胜平负概率
    var winProb=Math.round(composite);
    var loseProb=Math.round((100-composite)*0.75);
    var drawProb=100-winProb-loseProb;

    if(drawProb<8){drawProb=8;loseProb=100-winProb-drawProb;}
    if(winProb<8){winProb=8;drawProb=100-winProb-loseProb;}
    if(loseProb<8){loseProb=8;drawProb=100-winProb-loseProb;}

    // 进球预测
    var goals=calcGoals(composite, team1, team2, matchDate);

    return {
      win:winProb,draw:drawProb,lose:loseProb,
      goals:goals,
      factors:{
        rank:{home:rankFactor,away:100-rankFactor,weight:40,icon:'📊',name:'FIFA排名'},
        form:{home:formFactor,away:100-formFactor,weight:25,icon:'📈',name:'近期状态'},
        home:{home:homeFactor,away:100-homeFactor,weight:10,icon:'🏟️',name:'主场优势'},
        conf:{home:confFactor,away:100-confFactor,weight:15,icon:'🌍',name:'洲际对抗'},
        press:{home:pressFactor,away:100-pressFactor,weight:10,icon:'🎯',name:'出线压力'}
      }
    };
  }

  // 进球数预测（修正模型）
  function calcGoals(composite, team1, team2, matchDate){
    var en1=NAME_MAP[team1]||team1, en2=NAME_MAP[team2]||team2;
    var r1=getRank(en1), r2=getRank(en2);

    // 世界杯场均基础进球（每队）
    var baseG=1.2;

    // 攻击力系数：排名越高攻击越强（范围 ~0.5-1.9）
    var atk1=Math.max(0.5, Math.min(1.9, 2-(r1/50)*1.5));
    var atk2=Math.max(0.5, Math.min(1.9, 2-(r2/50)*1.5));

    // 防守漏洞系数：排名越低漏洞越大（范围 ~0.6-1.4）
    // 对手的漏洞系数越大，我方预期进球越多
    var leak1=0.6+(r1/50)*0.8;
    var leak2=0.6+(r2/50)*0.8;

    // 状态因子（50为基准，范围约0.4-2.0）
    var f1=getFormScore(team1)/50;
    var f2=getFormScore(team2)/50;

    // 主场温和加成
    var h1=getHomeAdvantage(team1)/100;
    var h2=getHomeAdvantage(team2)/100;

    // 预期进球 = 基础 * 攻击力 * 对手防守漏洞 * 状态 * 主场
    var x1=baseG*atk1*leak2*f1*(1+h1);
    var x2=baseG*atk2*leak1*f2*(1+h2);

    // 合理范围限制
    x1=Math.round(Math.min(5.0, Math.max(0.2, x1))*10)/10;
    x2=Math.round(Math.min(5.0, Math.max(0.2, x2))*10)/10;

    // 泊松分布求最可能比分
    var best={score:'0-0',prob:0};
    for(var i=0;i<=6;i++){
      for(var j=0;j<=6;j++){
        var p=poisson(i,x1)*poisson(j,x2);
        if(p>best.prob){best={score:i+'-'+j,prob:p};}
      }
    }

    var predParts=best.score.split('-');
    var ph=parseInt(predParts[0]), pa=parseInt(predParts[1]);
    var tot=x1+x2;

    // 大小球概率（基于总xG的泊松累积）
    var under25Prob=poissonCDF(2, tot);
    var over25Prob=Math.round((1-under25Prob)*100);

    return {
      xgHome:x1, xgAway:x2,
      predHome:ph, predAway:pa,
      totalXG:Math.round(tot*10)/10,
      over25:over25Prob, under25:100-over25Prob,
      bestScore:best.score, bestProb:Math.round(best.prob*100)
    };
  }

  function poisson(k, lambda){
    if(k<0||lambda<0)return 0;
    if(lambda===0)return k===0?1:0;
    var r=Math.exp(-lambda);
    for(var i=1;i<=k;i++)r*=lambda/i;
    return r;
  }

  function poissonCDF(k, lambda){
    var s=0;
    for(var i=0;i<=k;i++)s+=poisson(i,lambda);
    return Math.min(1, Math.max(0, s));
  }

      '<div style="font-size:11px;color:#555;margin-top:12px;line-height:1.6">'+
        '💡 鼠标悬停在任意比赛上可查看五维详细得分。近期状态基于本届世界杯已完赛结果动态更新。'+
        '出线压力根据小组排名和剩余场次实时计算。'+
      '</div>'+
    '</div>';

    var sorted=upcoming.slice().sort(function(a,b){
      var pa=calcWinProbMulti(a.h,a.a,a.d), pb=calcWinProbMulti(b.h,b.a,b.d);
      return Math.max(pb.win,pb.lose)-Math.max(pa.win,pa.lose);
    });

    // 悬殊对决
    html+='<div class="card"><div class="section-title">🔥 悬殊对决（综合胜率 > 70%）</div>';
    var blowout=0;
    for(var i=0;i<sorted.length;i++){
      var p=calcWinProbMulti(sorted[i].h,sorted[i].a,sorted[i].d);
      if(Math.max(p.win,p.lose)>=70){
        html+=renderMatchCard(sorted[i]);blowout++;
      }
    }
    if(blowout===0)html+='<div style="color:#888;padding:10px">暂无悬殊对决</div>';
    html+='</div>';

    // 势均力敌
    html+='<div class="card"><div class="section-title">⚖️ 势均力敌（胜率差 < 15%）</div>';
    var close=upcoming.slice().sort(function(a,b){
      var pa=calcWinProbMulti(a.h,a.a,a.d), pb=calcWinProbMulti(b.h,b.a,b.d);
      return Math.abs(pa.win-pa.lose)-Math.abs(pb.win-pb.lose);
    });
    var cc=0;
    for(var i=0;i<close.length;i++){
      var p=calcWinProbMulti(close[i].h,close[i].a,close[i].d);
      if(Math.abs(p.win-p.lose)<15){html+=renderMatchCard(close[i]);cc++;if(cc>=10)break;}
    }
    if(cc===0)html+='<div style="color:#888;padding:10px">暂无势均力敌的比赛</div>';
    html+='</div>';

    // 全部
    html+='<div class="card"><div class="section-title">📋 全部未赛（'+upcoming.length+'场）</div>';
    for(var i=0;i<upcoming.length;i++)html+=renderMatchCard(upcoming[i]);
    html+='</div>';

    document.getElementById('content').innerHTML=html;
  }

  // ===== 蒙特卡洛模拟 =====
  var mcResults=null; // 缓存模拟结果

  function getAllTeams(){
    var teams=[];
    for(var g in GROUPS){for(var i=0;i<GROUPS[g].length;i++)teams.push({name:GROUPS[g][i],group:g});}
    return teams;
  }

  // 获取剩余比赛
  function getRemainingMatches(){
    var rem=[];
    for(var i=0;i<MATCHES.length;i++){if(MATCHES[i].st!=='done')rem.push(MATCHES[i]);}
    return rem;
  }

  // 单场模拟（泊松进球）
  function simMatchGoals(home, away, matchDate){
    var en1=NAME_MAP[home]||home, en2=NAME_MAP[away]||away;
    var r1=getRank(en1), r2=getRank(en2);
    var baseG=1.2;
    var atk1=Math.max(0.5,Math.min(1.9,2-(r1/50)*1.5));
    var atk2=Math.max(0.5,Math.min(1.9,2-(r2/50)*1.5));
    var leak1=0.6+(r1/50)*0.8;
    var leak2=0.6+(r2/50)*0.8;
    var f1=getFormScore(home)/50, f2=getFormScore(away)/50;
    var h1=getHomeAdvantage(home)/100, h2=getHomeAdvantage(away)/100;
    var x1=baseG*atk1*leak2*f1*(1+h1);
    var x2=baseG*atk2*leak1*f2*(1+h2);
    x1=Math.max(0.1,x1); x2=Math.max(0.1,x2);

    // Poisson随机采样
    var g1=poissonRand(x1), g2=poissonRand(x2);
    return {h:g1, a:g2};
  }

  function poissonRand(lambda){
    var L=Math.exp(-lambda), k=0, p=1;
    while(p>L){k++;p*=Math.random();}
    return k-1;
  }

  // 单次完整模拟
  function runOneSimulation(){
    // 初始化积分表
    var table={};
    for(var g in GROUPS){
      table[g]={};
      for(var i=0;i<GROUPS[g].length;i++){table[g][GROUPS[g][i]]={p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0};}
    }

    // 录入已完赛结果
    for(var i=0;i<MATCHES.length;i++){
      var m=MATCHES[i];
      if(m.st==='done'){
        var hs=m.hs, as=m.as;
        if(table[m.g]&&table[m.g][m.h]&&table[m.g][m.a]){
          table[m.g][m.h].gf+=hs; table[m.g][m.h].ga+=as;
          table[m.g][m.a].gf+=as; table[m.g][m.a].ga+=hs;
          if(hs>as){table[m.g][m.h].w++;table[m.g][m.h].p+=3;table[m.g][m.a].l++;}
          else if(as>hs){table[m.g][m.a].w++;table[m.g][m.a].p+=3;table[m.g][m.h].l++;}
          else{table[m.g][m.h].d++;table[m.g][m.h].p++;table[m.g][m.a].d++;table[m.g][m.a].p++;}
        }
      }
    }

    // 模拟剩余比赛
    var rem=getRemainingMatches();
    for(var i=0;i<rem.length;i++){
      var m=rem[i];
      var goals=simMatchGoals(m.h, m.a, m.d);
      var hs=goals.h, as=goals.a;
      if(table[m.g]&&table[m.g][m.h]&&table[m.g][m.a]){
        table[m.g][m.h].gf+=hs; table[m.g][m.h].ga+=as;
        table[m.g][m.a].gf+=as; table[m.g][m.a].ga+=hs;
        if(hs>as){table[m.g][m.h].w++;table[m.g][m.h].p+=3;table[m.g][m.a].l++;}
        else if(as>hs){table[m.g][m.a].w++;table[m.g][m.a].p+=3;table[m.g][m.h].l++;}
        else{table[m.g][m.h].d++;table[m.g][m.h].p++;table[m.g][m.a].d++;table[m.g][m.a].p++;}
      }
    }

    // 排名
    var groupOrder={};
    for(var g in table){
      var arr=[];
      for(var t in table[g]){
        var s=table[g][t]; s.gd=s.gf-s.ga;
        arr.push({name:t,stats:s});
      }
      arr.sort(function(a,b){
        if(b.stats.p!==a.stats.p)return b.stats.p-a.stats.p;
        if(b.stats.gd!==a.stats.gd)return b.stats.gd-a.stats.gd;
        return b.stats.gf-a.stats.gf;
      });
      groupOrder[g]=arr;
    }

    // 晋级队伍（小组前2 + 8个最佳第3）
    var qualified=[];
    var thirdPlaces=[];
    for(var g in groupOrder){
      var arr=groupOrder[g];
      qualified.push({name:arr[0].name,group:g,pos:1});
      qualified.push({name:arr[1].name,group:g,pos:2});
      thirdPlaces.push({name:arr[2].name,group:g,stats:arr[2].stats});
    }
    // 最佳第3排序
    thirdPlaces.sort(function(a,b){
      if(b.stats.p!==a.stats.p)return b.stats.p-a.stats.p;
      if(b.stats.gd!==a.stats.gd)return b.stats.gd-a.stats.gd;
      return b.stats.gf-a.stats.gf;
    });
    for(var i=0;i<8;i++){qualified.push({name:thirdPlaces[i].name,group:thirdPlaces[i].group,pos:3});}

    // 简易淘汰赛
    var roundTeams=qualified.slice();
    while(roundTeams.length>1){
      var winners=[];
      for(var i=0;i<roundTeams.length;i+=2){
        var t1=roundTeams[i].name, t2=roundTeams[i+1].name;
        var en1=NAME_MAP[t1]||t1, en2=NAME_MAP[t2]||t2;
        var r1=getRank(en1), r2=getRank(en2);
        var str1=100-(r1*1.2), str2=100-(r2*1.2);
        str1*=0.8+Math.random()*0.4;
        str2*=0.8+Math.random()*0.4;
        winners.push(str1>str2?roundTeams[i]:roundTeams[i+1]);
      }
      roundTeams=winners;
    }

    return {
      groups:groupOrder,
      qualified:qualified,
      winner:roundTeams[0].name
    };
  }

  function runMonteCarlo(iterations, progressCb){
    var allTeams=getAllTeams();
    var counts={};
    for(var i=0;i<allTeams.length;i++){
      var t=allTeams[i].name;
      counts[t]={advance:0,quarter:0,semi:0,final:0,win:0,total:0};
    }

    for(var i=0;i<iterations;i++){
      var result=runOneSimulation();
      // 晋级
      for(var j=0;j<result.qualified.length;j++){counts[result.qualified[j].name].advance++;}
      // 淘汰赛阶段
      var q=result.qualified;
      // 第一轮后剩16队
      var r16=simKnockoutRound(q.slice());
      for(var j=0;j<r16.length;j++){counts[r16[j].name].quarter++;}
      var r8=simKnockoutRound(r16.slice());
      for(var j=0;j<r8.length;j++){counts[r8[j].name].semi++;}
      var r4=simKnockoutRound(r8.slice());
      for(var j=0;j<r4.length;j++){counts[r4[j].name].final++;}
      var r2=simKnockoutRound(r4.slice());
      counts[r2[0].name].win++;

      if(progressCb && i%100===0) progressCb(i);
    }

    // 计算百分比
    var probs=[];
    for(var t in counts){
      var c=counts[t];
      probs.push({
        name:t,
        advance:Math.round(c.advance/iterations*1000)/10,
        quarter:Math.round(c.quarter/iterations*1000)/10,
        semi:Math.round(c.semi/iterations*1000)/10,
        final:Math.round(c.final/iterations*1000)/10,
        win:c.win/iterations*100
      });
    }
    probs.sort(function(a,b){return b.win-a.win;});
    return probs;
  }

  function simKnockoutRound(teams){
    var winners=[];
    for(var i=0;i<teams.length;i+=2){
      var t1=teams[i].name, t2=teams[i+1].name;
      var en1=NAME_MAP[t1]||t1, en2=NAME_MAP[t2]||t2;
      var r1=getRank(en1), r2=getRank(en2);
      var s1=100-(r1*1.2), s2=100-(r2*1.2);
      s1*=0.7+Math.random()*0.6;
      s2*=0.7+Math.random()*0.6;
      winners.push(s1>s2?teams[i]:teams[i+1]);
    }
    return winners;
  }

  function renderMonteCarlo(){
    var html='';
    html+='<div class="detail-panel">'+
      '<div class="section-title" style="margin-bottom:6px">🎲 蒙特卡洛模拟</div>'+
      '<div style="font-size:13px;color:#aaa;line-height:1.8;margin-bottom:8px">'+
        '模拟数千次完整比赛（小组赛+淘汰赛），统计各队的<b style="color:#ffb020">晋级概率</b>和<b style="color:#6c5ce7">夺冠概率</b>。'+
        '每次模拟基于泊松分布随机生成进球数。'+
      '</div>'+
      '<div class="mc-controls">'+
        '<span style="color:#888;font-size:13px">模拟次数：</span>'+
        '<input class="mc-iter" id="mcIter" type="number" value="5000" min="500" max="50000" step="500">'+
        '<button class="btn btn-go btn-sm" id="mcRunBtn">▶ 开始模拟</button>'+
        '<span class="mc-status" id="mcStatus"></span>'+
      '</div>';

    if(mcResults){
      html+='<div style="font-size:11px;color:#555;margin-bottom:8px">'+
        '上次模拟完成 · '+mcResults.length+' 支球队 · 点击按钮重新模拟</div>';
      html+=renderMCResults(mcResults);
    }

    html+='</div>';

    if(mcResults){
      html+='<div class="mc-grid">';
      // Group advancement
      var byGroup={};
      for(var g in GROUPS){byGroup[g]=[];}
      for(var i=0;i<mcResults.length;i++){
        var t=mcResults[i];
        for(var g in GROUPS){
          for(var j=0;j<GROUPS[g].length;j++){
            if(GROUPS[g][j]===t.name&&byGroup[g].length<4)byGroup[g].push(t);
          }
        }
      }
      for(var g in byGroup){
        if(byGroup[g].length===0)continue;
        html+='<div class="mc-card"><h4>'+g+'组 晋级概率</h4>';
        byGroup[g].sort(function(a,b){return b.advance-a.advance;});
        for(var i=0;i<byGroup[g].length;i++){
          var t=byGroup[g][i];
          var color=t.advance>=80?'#6c5ce7':(t.advance>=40?'#a78bfa':'#555');
          html+='<div class="mc-row">'+
            '<span class="mc-rank'+(i<2?' top3':'')+'">'+(i+1)+'</span>'+
            '<span class="mc-team">'+t.name+'</span>'+
            '<div class="mc-bar-wrap"><div class="mc-bar-fill" style="width:'+Math.max(2,t.advance)+'%;background:linear-gradient(90deg,'+color+','+(t.advance>=80?'#a78bfa':'#555')+')">'+
              (t.advance>=30?t.advance+'%':'')+'</div></div>'+
            '<span class="mc-pct" style="color:'+color+'">'+t.advance+'%</span>'+
            '</div>';
        }
        html+='</div>';
      }
      html+='</div>';
    }

    document.getElementById('content').innerHTML=html;

    // 绑定按钮
    document.getElementById('mcRunBtn').addEventListener('click',function(){
      var iter=parseInt(document.getElementById('mcIter').value)||5000;
      iter=Math.max(100,Math.min(50000,iter));
      runMCSimulation(iter);
    });
  }

  function renderMCResults(results){
    var html='<div style="margin-top:16px">'+
      '<div class="section-title" style="font-size:15px">🏆 夺冠概率 TOP 20</div>'+
      '<div style="font-size:11px;color:#555;margin-bottom:6px">'+
        'Win=夺冠 | Final=进决赛 | Semi=四强 | Quarter=八强 | Advance=小组出线</div>';

    var top=results.slice(0,20);
    for(var i=0;i<top.length;i++){
      var t=top[i];
      var gold=i<3;
      html+='<div class="mc-row">'+
        '<span class="mc-rank'+(gold?' top3':'')+'">'+(i+1)+'</span>'+
        '<span class="mc-team">'+(gold?'⭐ ':'')+t.name+'</span>'+
        '<div class="mc-bar-wrap"><div class="mc-bar-fill" style="width:'+Math.max(1,t.win*5)+'%;background:linear-gradient(90deg,'+(gold?'#ffb020':'#6c5ce7')+',#a78bfa)">'+
          (t.win>=1?t.win.toFixed(1)+'%':'')+'</div></div>'+
        '<span class="mc-pct" style="color:'+(gold?'#ffb020':'#6c5ce7')+'">'+(t.win<0.1?'<0.1':t.win.toFixed(1))+'%</span>'+
        '<span class="mc-stats">'+
          '进决赛'+(t.final<0.1?'<0.1':t.final.toFixed(1))+'% · '+
          '四强'+(t.semi<0.1?'<0.1':t.semi.toFixed(1))+'% · '+
          '出线'+(t.advance<0.1?'<0.1':t.advance.toFixed(1))+'%'+
        '</span>'+
      '</div>';
    }
    html+='</div>';
    return html;
  }

  function runMCSimulation(iterations){
    document.getElementById('mcStatus').textContent='模拟中...';
    document.getElementById('mcRunBtn').disabled=true;

    // 异步执行避免阻塞UI
    setTimeout(function(){
      var startTime=Date.now();
      mcResults=runMonteCarlo(iterations);
      var elapsed=((Date.now()-startTime)/1000).toFixed(1);

      renderMonteCarlo();
      document.getElementById('mcStatus').textContent='✅ 完成！'+iterations+'次模拟耗时'+elapsed+'秒';
      document.getElementById('mcRunBtn').disabled=false;
    },50);
  }

  // 首次进入自动跑 2000 次轻量模拟
  var mcAutoRan=false;
  var origSwitchTab=switchTab;
  switchTab=function(tab){
    origSwitchTab(tab);
    if(tab==='montecarlo' && !mcAutoRan){
      mcAutoRan=true;
      setTimeout(function(){runMCSimulation(2000);},100);
    }
  };

  init();
  console.log('🏆 2026世界杯数据中心 · 五维胜率模型 + 蒙特卡洛模拟已就绪');
})();
