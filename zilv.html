<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="自律助手">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f1a">
<link rel="manifest" href="data:application/json,{'name':'自律助手','short_name':'自律','start_url':'.','display':'standalone','background_color':'#0f0f1a','theme_color':'#3b82f6','icons':[{'src':'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%230f0f1a%22 width=%22100%22 height=%22100%22 rx=%2220%22/><text x=%2250%22 y=%2265%22 text-anchor=%22middle%22 font-size=%2250%22>💪</text></svg>','sizes':'any','type':'image/svg+xml'}]}">
<title>自律助手 · 健身 + 学习 + 闹钟</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background:#0f0f1a;color:#e0e0e0;min-height:100vh;
  -webkit-tap-highlight-color:transparent;
}
.app{max-width:500px;margin:0 auto;padding:16px;padding-top:max(30px,env(safe-area-inset-top,20px));padding-bottom:100px}

/* header */
.header{display:flex;justify-content:space-between;align-items:center;padding:20px 0 14px}
.header h1{font-size:22px;color:#fff}
.streak-badge{
  display:flex;align-items:center;gap:4px;padding:6px 14px;
  background:linear-gradient(135deg,#ff6b35,#ff3860);color:#fff;
  border-radius:20px;font-size:12px;font-weight:600;
}

/* date strip */
.date-strip{display:flex;gap:6px;overflow-x:auto;padding:8px 0 16px;scrollbar-width:none}
.date-strip::-webkit-scrollbar{display:none}
.day-chip{
  min-width:44px;height:60px;border-radius:12px;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  background:#1a1a2e;border:1px solid #252540;cursor:pointer;
  font-size:10px;color:#888;transition:all .2s;flex-shrink:0;
}
.day-chip .dow{font-size:11px;margin-bottom:2px}
.day-chip .dnum{font-size:16px;font-weight:700}
.day-chip.today{background:#3b82f6;border-color:#3b82f6;color:#fff}
.day-chip.done{background:#1a2a1a;border-color:#2a4a2a}
.day-chip.done .dnum{color:#4caf50}

/* section */
.sec{margin-bottom:18px}
.sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-title{font-size:15px;font-weight:600;color:#fff;display:flex;align-items:center;gap:6px}
.sec-add{
  width:28px;height:28px;border-radius:50%;background:#3b82f6;
  color:#fff;font-size:18px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

/* progress card */
.prog-card{
  background:#1a1a2e;border-radius:16px;padding:16px;border:1px solid #252540;
}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-label{font-size:13px;color:#aaa}
.prog-val{font-size:13px;font-weight:600}
.prog-bar-wrap{height:8px;background:#252540;border-radius:4px;overflow:hidden;margin-bottom:12px}
.prog-bar{height:100%;border-radius:4px;transition:width .5s}
.prog-bar.fit{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.prog-bar.study{background:linear-gradient(90deg,#ffb020,#ff6b35)}

/* entry card */
.entry-card{
  background:#1a1a2e;border-radius:14px;padding:14px;margin-bottom:8px;
  border:1px solid #252540;cursor:pointer;transition:all .15s;
}
.entry-card:hover{background:#1e1e35}
.entry-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.entry-name{font-size:14px;font-weight:600;color:#fff}
.entry-time{font-size:11px;color:#888}
.entry-detail{font-size:12px;color:#777;display:flex;gap:16px}
.entry-tag{
  display:inline-block;padding:3px 10px;border-radius:10px;
  font-size:10px;font-weight:600;
}
.entry-tag.fitness{background:rgba(59,130,246,.2);color:#60a5fa}
.entry-tag.study{background:rgba(255,176,32,.2);color:#ffd56b}

/* alarm card */
.alarm-card{
  background:#1a1a2e;border-radius:14px;padding:14px;margin-bottom:8px;
  border:1px solid #252540;display:flex;align-items:center;gap:12px;
}
.alarm-time{font-size:24px;font-weight:700;color:#ffb020;min-width:70px}
.alarm-info{flex:1}
.alarm-label{font-size:13px;color:#fff;font-weight:500}
.alarm-sub{font-size:11px;color:#888;margin-top:2px}
.alarm-toggle{
  width:48px;height:28px;border-radius:14px;background:#333;
  cursor:pointer;position:relative;transition:background .3s;
}
.alarm-toggle.on{background:#3b82f6}
.alarm-toggle::after{
  content:'';position:absolute;top:3px;left:3px;
  width:22px;height:22px;border-radius:50%;background:#fff;
  transition:transform .3s;
}
.alarm-toggle.on::after{transform:translateX(20px)}

/* modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
}
.modal{
  background:#1a1a2e;border-radius:20px 20px 0 0;padding:24px;
  width:100%;max-width:500px;max-height:80vh;overflow-y:auto;
}
.modal h3{font-size:18px;color:#fff;margin-bottom:16px}
.modal input,.modal select,.modal textarea{
  width:100%;padding:12px 14px;border-radius:10px;border:1px solid #252540;
  background:#111;color:#fff;font-size:14px;margin-bottom:10px;
  font-family:inherit;outline:none;
}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:#3b82f6}
.modal textarea{resize:none;height:70px}
.modal-row{display:flex;gap:10px}
.modal-row>*{flex:1}
.modal .btn-row{display:flex;gap:10px;margin-top:6px}
.btn{
  padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;
  border:none;cursor:pointer;flex:1;font-family:inherit;
}
.btn-purple{background:#3b82f6;color:#fff}
.btn-outline{background:transparent;color:#888;border:1px solid #333}

/* empty state */
.empty{text-align:center;padding:30px;color:#555;font-size:13px}

/* nav */
.nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:500px;background:#1a1a2e;border-top:1px solid #252540;
  display:flex;padding:8px 0 env(safe-area-inset-bottom,8px);z-index:50;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 0;cursor:pointer;color:#888;font-size:10px;transition:color .2s;
}
.nav-item .ni{font-size:20px}
.nav-item.on{color:#3b82f6}

/* chart */
.chart-wrap{display:flex;align-items:flex-end;gap:4px;height:100px;padding:4px 0}
.chart-bar{
  flex:1;border-radius:4px 4px 0 0;transition:height .5s;min-width:8px;
}

/* confetti */
.confetti{position:fixed;pointer-events:none;z-index:200;animation:confFall 1.5s ease-out forwards}
@keyframes confFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(400px) rotate(720deg);opacity:0}}

/* toast */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200;
  background:#333;color:#fff;padding:10px 24px;border-radius:20px;
  font-size:13px;opacity:0;transition:opacity .3s;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app" id="app"></div>
<nav class="nav" id="nav"></nav>
<div class="toast" id="toast"></div>
<div id="modal-container"></div>

<script>
(function(){
'use strict';
var today=new Date().toISOString().slice(0,10); // 2026-06-14

// DATA
function load(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}
var data=load('discipline_data',{
  fitness:[],   // {date, name, duration, sets, reps, note, time}
  study:[],     // {date, subject, duration, note, time}
  goals:{fitness:60, study:120}, // 每日目标(分钟)
  alarms:[     // {time, label, days, on}
    {time:'07:00',label:'晨间健身',days:[1,1,1,1,1,1,1],on:true},
    {time:'09:00',label:'开始学习',days:[1,1,1,1,1,0,0],on:true},
    {time:'21:30',label:'晚间复盘',days:[1,1,1,1,1,1,1],on:false}
  ]
});

// PWA 安装
var installPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();installPrompt=e;});
window.addEventListener('appinstalled',function(){installPrompt=null;toast('✅ 已安装到桌面！');});

// NAV
var currentPage='today';
function renderNav(){
  var pages=[
    {id:'today',label:'今日',icon:'📅'},
    {id:'train',label:'计划',icon:'📋'},
    {id:'motive',label:'动力',icon:'⭐',center:true},
    {id:'records',label:'记录',icon:'🗂️'},
    {id:'alarms',label:'闹钟',icon:'⏰'}
  ];
  var h='';
  for(var i=0;i<pages.length;i++){
    var p=pages[i];
    if(p.center){
      h+='<div class="nav-item nav-center'+(p.id===currentPage?' on':'')+'" data-page="'+p.id+'">'+
        '<div class="ni" id="navPhoto" style="width:44px;height:44px;border-radius:50%;background:#1a1a2e;border:2px solid #3b82f6;overflow:hidden;display:flex;align-items:center;justify-content:center;margin-top:-18px">'+
        (localStorage.getItem('motive_photo')?'<img src="'+localStorage.getItem('motive_photo')+'" style="width:100%;height:100%;object-fit:cover">':'⭐')+
        '</div><div>'+p.label+'</div></div>';
    }else{
      h+='<div class="nav-item'+(p.id===currentPage?' on':'')+'" data-page="'+p.id+'">'+
        '<div class="ni">'+p.icon+'</div><div>'+p.label+'</div></div>';
    }
  }
  document.getElementById('nav').innerHTML=h;
}

// RENDER TODAY
function getTodayEntries(type){
  return data[type].filter(function(e){return e.date===today;});
}
function getTodayMinutes(type){
  return getTodayEntries(type).reduce(function(s,e){return s+(e.duration||0);},0);
}
function getTodayGoal(type){return data.goals[type]||60;}

// 训练页面（健身+学习合并）
// 计划页（每日日志 + 每周安排 + 目标）
function renderTrain(){
  var h='<div class="header"><h1>📋 计划</h1></div>';
  // 今日摘要
  var tf=getTodayMinutes('fitness'),ts=getTodayMinutes('study');
  var fg=getTodayGoal('fitness'),sg=getTodayGoal('study');
  var fp=Math.min(100,Math.round(tf/fg*100)),sp=Math.min(100,Math.round(ts/sg*100));
  h+='<div class="prog-card" style="margin-bottom:10px;border-color:rgba(59,130,246,.3)">'+
    '<div style="display:flex;gap:12px">'+
      '<div style="flex:1"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span>💪 健身</span><span style="color:#3b82f6">'+tf+'/'+fg+'分</span></div><div class="prog-bar-wrap"><div class="prog-bar fit" style="width:'+fp+'%"></div></div></div>'+
      '<div style="flex:1"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span>📚 学习</span><span style="color:#ffb020">'+ts+'/'+sg+'分</span></div><div class="prog-bar-wrap"><div class="prog-bar study" style="width:'+sp+'%"></div></div></div>'+
    '</div><div style="display:flex;gap:8px;margin-top:10px">'+
      '<button class="btn btn-purple" style="flex:1;padding:8px;font-size:12px" onclick="openModal(\'fitness\')">+ 健身</button>'+
      '<button class="btn btn-purple" style="flex:1;padding:8px;font-size:12px;background:#ffb020" onclick="openModal(\'study\')">+ 学习</button>'+
    '</div></div>';
  // 三选项卡
  h+='<div class="prog-card" style="padding:0;overflow:hidden">'+
    '<div style="display:flex;background:#0f0f1a">'+
      '<div class="ptab active" data-pt="daily" onclick="switchPTab(this)" style="flex:1;text-align:center;padding:10px;font-size:13px;font-weight:600;color:#3b82f6;border-bottom:2px solid #3b82f6;cursor:pointer">📅 每日</div>'+
      '<div class="ptab" data-pt="week" onclick="switchPTab(this)" style="flex:1;text-align:center;padding:10px;font-size:13px;font-weight:600;color:#555;border-bottom:2px solid transparent;cursor:pointer">📆 每周</div>'+
      '<div class="ptab" data-pt="goal" onclick="switchPTab(this)" style="flex:1;text-align:center;padding:10px;font-size:13px;font-weight:600;color:#555;border-bottom:2px solid transparent;cursor:pointer">🎯 目标</div>'+
    '</div>'+
    '<div class="pcontent" id="pc-daily" style="padding:12px">'+buildDailyLog()+'</div>'+
    '<div class="pcontent" id="pc-week" style="padding:12px;display:none">'+buildWeekPlan()+'</div>'+
    '<div class="pcontent" id="pc-goal" style="padding:12px;display:none">'+buildGoalTracker()+'</div>'+
  '</div>';
  document.getElementById('app').innerHTML=h;
}

window.switchPTab=function(el){
  var ts=document.querySelectorAll('.ptab');for(var i=0;i<ts.length;i++){ts[i].style.color='#555';ts[i].style.borderBottomColor='transparent';ts[i].classList.remove('active');}
  el.style.color='#3b82f6';el.style.borderBottomColor='#3b82f6';el.classList.add('active');
  var pt=el.getAttribute('data-pt');
  ['daily','week','goal'].forEach(function(id){document.getElementById('pc-'+id).style.display=pt===id?'block':'none';});
};

function buildDailyLog(){
  var h='',dow=new Date().getDay();
  var allDates={};data.fitness.forEach(function(e){allDates[e.date]=1;});data.study.forEach(function(e){allDates[e.date]=1;});
  var dates=Object.keys(allDates).sort().reverse();
  if(dates.length===0)return '<div class="empty">还没有记录 ✨</div>';
  for(var di=0;di<Math.min(14,dates.length);di++){
    var ds=dates[di],fits=data.fitness.filter(function(e){return e.date===ds;}),studies=data.study.filter(function(e){return e.date===ds;});
    var tm=fits.reduce(function(s,e){return s+(e.duration||0);},0)+studies.reduce(function(s,e){return s+(e.duration||0);},0);
    var d=new Date(ds),dws=['周日','周一','周二','周三','周四','周五','周六'],isT=ds===today;
    h+='<div style="'+(isT?'background:rgba(59,130,246,.05);border-radius:8px;':'')+'padding:8px;margin-bottom:4px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'+
        '<span style="font-weight:600;color:#fff;font-size:13px">'+(d.getMonth()+1)+'月'+d.getDate()+'日 '+dws[d.getDay()]+'</span>'+
        (isT?'<span style="background:#3b82f6;color:#fff;padding:1px 7px;border-radius:10px;font-size:9px">今天</span>':'')+
        '<span style="font-size:10px;color:#888">'+(tm>0?tm+'分':'')+'</span></div>';
    for(var fi=0;fi<fits.length;fi++){var e=fits[fi];
      h+='<div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:11px"><span style="background:rgba(59,130,246,.15);padding:1px 6px;border-radius:6px;color:#3b82f6;font-size:9px">💪</span><span style="color:#ddd;flex:1">'+esc(e.name)+(e.bodyPart?' · '+e.bodyPart:'')+'</span>'+(e.sets?'<span style="color:#888">'+e.sets+'组'+(e.reps?'×'+e.reps:'')+'</span>':'')+(e.duration?'<span style="color:#888">'+e.duration+'分</span>':'')+'</div>';}
    for(var si=0;si<studies.length;si++){var e=studies[si];
      h+='<div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:11px"><span style="background:rgba(255,176,32,.15);padding:1px 6px;border-radius:6px;color:#ffb020;font-size:9px">📚</span><span style="color:#ddd;flex:1">'+esc(e.subject)+(e.book?' · '+esc(e.book):'')+'</span>'+(e.duration?'<span style="color:#888">'+e.duration+'分</span>':'')+'</div>';}
    h+='</div>';
  }
  return h;
}

function buildWeekPlan(){
  var h='<div style="font-size:11px;color:#888;margin-bottom:8px">点击每天设置计划，会显示在每日视图中</div>';
  var dow=new Date().getDay(),dws=['日','一','二','三','四','五','六'];
  for(var d=0;d<7;d++){
    var plan=(data.weekPlan||{})[d]||[],isToday=d===dow;
    h+='<div style="display:flex;align-items:flex-start;gap:8px;padding:8px;margin-bottom:2px;'+(isToday?'background:rgba(59,130,246,.08);border-radius:8px;':'')+'">'+
      '<div style="min-width:34px;text-align:center;font-weight:700;color:'+(isToday?'#3b82f6':'#888')+';font-size:12px;padding-top:2px">周'+dws[d]+(isToday?'*':'')+'</div>'+
      '<div style="flex:1">';
    if(plan.length===0)h+='<div style="color:#555;font-size:11px;padding:4px 0" onclick="editWD('+d+')">点击设置 →</div>';
    else{for(var i=0;i<plan.length;i++)h+='<div style="display:flex;align-items:center;gap:4px;padding:2px 0;font-size:11px"><span style="color:#ddd">'+esc(plan[i])+'</span><span style="color:#ff3860;cursor:pointer;font-size:11px" onclick="rmWI('+d+','+i+')">✕</span></div>';}
    h+='<div style="font-size:10px;color:#3b82f6;cursor:pointer;margin-top:2px" onclick="editWD('+d+')">+ 添加</div></div></div>';
  }
  return h;
}
window.editWD=function(d){var cur=(data.weekPlan||{})[d]||[],val=prompt('周'+['日','一','二','三','四','五','六'][d]+'计划 (逗号分隔)',''+cur.join(', '));if(val===null)return;if(!data.weekPlan)data.weekPlan={};data.weekPlan[d]=val.split(/[,，]/).map(function(s){return s.trim();}).filter(function(s){return s;});persist();renderTrain();};
window.rmWI=function(d,i){data.weekPlan[d].splice(i,1);persist();renderTrain();};

function buildGoalTracker(){
  var h='<button class="btn btn-outline" style="width:100%;padding:10px;margin-bottom:8px" onclick="addG()">+ 添加目标</button>';
  var goals=data.longGoals||[],progData=data.goalProgress||{};
  if(goals.length===0)return h+'<div class="empty">还没有目标 🎯</div>';
  for(var i=0;i<goals.length;i++){
    var g=goals[i],p=progData[g.title]||{current:0,target:g.target||10};
    var pct=Math.min(100,Math.round(p.current/p.target*100));
    h+='<div style="background:#0f0f1a;border-radius:10px;padding:12px;margin-bottom:8px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
        '<span style="color:#fff;font-weight:600;font-size:14px">'+esc(g.title)+'</span>'+
        '<span style="color:#ff3860;cursor:pointer;font-size:14px" onclick="delG('+i+')">✕</span></div>'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
        '<div class="prog-bar-wrap" style="margin-bottom:0"><div class="prog-bar fit" style="width:'+pct+'%"></div></div>'+
        '<span style="font-size:12px;font-weight:700;color:#3b82f6;white-space:nowrap">'+p.current+'/'+p.target+'</span></div>'+
      '<div style="display:flex;gap:6px">'+
        '<button class="btn btn-outline" style="flex:1;padding:6px;font-size:11px" onclick="incG('+i+',1)">+1</button>'+
        '<button class="btn btn-outline" style="flex:1;padding:6px;font-size:11px" onclick="incG('+i+',5)">+5</button>'+
        '<button class="btn btn-outline" style="flex:1;padding:6px;font-size:11px" onclick="incG('+i+',10)">+10</button>'+
      '</div></div>';
  }
  return h;
}
window.addG=function(){var t=prompt('目标名称：');if(!t||!t.trim())return;var n=parseInt(prompt('目标次数：','10'))||10;data.longGoals.push({title:t.trim(),target:n});if(!data.goalProgress)data.goalProgress={};data.goalProgress[t.trim()]=data.goalProgress[t.trim()]||{current:0,target:n};persist();renderTrain();};
window.incG=function(i,n){var g=data.longGoals[i];if(!data.goalProgress)data.goalProgress={};var p=data.goalProgress[g.title]||{current:0,target:g.target};p.current+=n;data.goalProgress[g.title]=p;persist();renderTrain();};
window.delG=function(i){var t=data.longGoals[i].title;data.longGoals.splice(i,1);if(data.goalProgress&&data.goalProgress[t])delete data.goalProgress[t];persist();renderTrain();};

// 动力页面
function renderMotive(){
  var savedPhoto=localStorage.getItem('motive_photo')||'';
  var h='<div class="header"><h1>⭐ 你的动力</h1></div>';
  h+='<div style="text-align:center">';
  // 照片区
  h+='<div style="width:160px;height:160px;border-radius:50%;margin:0 auto 16px;background:#1a1a2e;border:3px solid #3b82f6;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(59,130,246,.3)" id="motivePhoto">';
  if(savedPhoto)h+='<img src="'+savedPhoto+'" style="width:100%;height:100%;object-fit:cover">';
  else h+='<div style="font-size:50px">⭐</div>';
  h+='</div>';

function getFitnessMin(ds){
  return data.fitness.filter(function(e){return e.date===ds;}).reduce(function(s,e){return s+(e.duration||0);},0);
}
function getStudyMin(ds){
  return data.study.filter(function(e){return e.date===ds;}).reduce(function(s,e){return s+(e.duration||0);},0);
}

// STREAK
function calcStreak(){
  var s=0,d=new Date();
  while(true){
    var ds=d.toISOString().slice(0,10);
    if(getFitnessMin(ds)+getStudyMin(ds)>0){s++;d.setDate(d.getDate()-1);}
    else break;
  }
  // 如果今天还没记录，从昨天开始算
  if(s===0){d.setDate(d.getDate()-1);var ds=d.toISOString().slice(0,10);if(getFitnessMin(ds)+getStudyMin(ds)>0){s++;d.setDate(d.getDate()-2);while(true){ds=d.toISOString().slice(0,10);if(getFitnessMin(ds)+getStudyMin(ds)>0){s++;d.setDate(d.getDate()-1);}else break;}}}
  return s;
}

// 导出单个闹钟到系统日历
function exportToCalendar(i){
  var a=data.alarms[i];
  var now=new Date();
  var timeParts=a.time.split(':');
  var start=new Date(now.getFullYear(),now.getMonth(),now.getDate(),parseInt(timeParts[0]),parseInt(timeParts[1]));
  var end=new Date(start.getTime()+30*60000);
  var rrule='';
  var dayMap=['SU','MO','TU','WE','TH','FR','SA'];
  var activeDays=[];
  for(var d=0;d<7;d++){if(a.days[d])activeDays.push(dayMap[d]);}
  if(activeDays.length===7)rrule='RRULE:FREQ=WEEKLY';
  else if(activeDays.length>0)rrule='RRULE:FREQ=WEEKLY;BYDAY='+activeDays.join(',');
  else rrule=''; // 单次

  var ics='BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//自律助手//CN\nBEGIN:VEVENT\n'+
    'DTSTART:'+fmtICS(start)+'\nDTEND:'+fmtICS(end)+'\n'+
    'SUMMARY:⏰ '+a.label+'\nDESCRIPTION:自律助手提醒 - '+a.label+'\n'+
    (rrule?rrule+'\n':'')+
    'BEGIN:VALARM\nTRIGGER:-PT5M\nACTION:DISPLAY\nDESCRIPTION:该去'+a.label+'了💪\nEND:VALARM\n'+
    'END:VEVENT\nEND:VCALENDAR';

  var blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var link=document.createElement('a');
  link.href=url;link.download=a.label+'.ics';document.body.appendChild(link);
  link.click();document.body.removeChild(link);URL.revokeObjectURL(url);
  toast('✅ 已下载，点击文件导入日历即可');
}
function fmtICS(d){return d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2)+'T'+('0'+d.getHours()).slice(-2)+('0'+d.getMinutes()).slice(-2)+'00';}
window.exportToCalendar=exportToCalendar;

// 导出全部闹钟
function exportAllAlarms(){
  var ics='BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//自律助手//CN\n';
  var now=new Date();
  for(var i=0;i<data.alarms.length;i++){
    var a=data.alarms[i];
    if(!a.on)continue;
    var tp=a.time.split(':');
    var start=new Date(now.getFullYear(),now.getMonth(),now.getDate(),parseInt(tp[0]),parseInt(tp[1]));
    var end=new Date(start.getTime()+30*60000);
    var dayMap=['SU','MO','TU','WE','TH','FR','SA'];
    var ad=[];for(var d=0;d<7;d++){if(a.days[d])ad.push(dayMap[d]);}
    var rrule=ad.length===7?'RRULE:FREQ=WEEKLY':(ad.length>0?'RRULE:FREQ=WEEKLY;BYDAY='+ad.join(','):'');
    ics+='BEGIN:VEVENT\nDTSTART:'+fmtICS(start)+'\nDTEND:'+fmtICS(end)+'\nSUMMARY:⏰ '+a.label+'\n'+(rrule?rrule+'\n':'')+'BEGIN:VALARM\nTRIGGER:-PT5M\nACTION:DISPLAY\nDESCRIPTION:该去'+a.label+'了💪\nEND:VALARM\nEND:VEVENT\n';
  }
  ics+='END:VCALENDAR';
  var blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var link=document.createElement('a');link.href=url;link.download='自律提醒.ics';document.body.appendChild(link);
  link.click();document.body.removeChild(link);URL.revokeObjectURL(url);
  toast('✅ 全部闹钟已导出，导入日历即可');
}

// 左滑删除（滑开停住，点删除不会弹回）
var swipeStartX=0,swipeEl=null,swipeOpen=null;
document.addEventListener('touchstart',function(e){
  // 判断点击是否在当前打开的swipe-wrap内
  var sameWrap=swipeOpen&&swipeOpen.parentElement&&swipeOpen.parentElement.contains(e.target);
  if(swipeOpen&&!sameWrap){
    swipeOpen.style.transform='translateX(0)';swipeOpen=null;
  }
  var item=e.target.closest('.swipe-item');
  if(item){swipeEl=item;swipeStartX=e.touches[0].clientX;}
},true);
document.addEventListener('touchmove',function(e){
  if(!swipeEl)return;
  var dx=e.touches[0].clientX-swipeStartX;
  if(dx<-30){swipeEl.style.transform='translateX(-80px)';}
  else if(dx>20){swipeEl.style.transform='translateX(0)';}
},true);
document.addEventListener('touchend',function(){
  if(!swipeEl)return;
  if(swipeEl.style.transform==='translateX(-80px)'){swipeOpen=swipeEl;} // 停住
  else{swipeOpen=null;}
  swipeEl=null;
},true);

function saveEntry(){
  var type=editType;
  var entry={date:today,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})};
  if(type==='fitness'){
    entry.name=document.getElementById('mfName').value.trim()||'训练';
    entry.bodyPart=document.getElementById('mfBodyPart').getAttribute('data-sel')||'全身';
    entry.duration=parseInt(document.getElementById('mfDur').value)||0;
    entry.sets=parseInt(document.getElementById('mfSets').value)||0;
    entry.reps=parseInt(document.getElementById('mfReps').value)||0;
    var fn=document.getElementById('mfFitNote');
    entry.note=fn?fn.value.trim():'';
  }else{
    entry.subject=document.getElementById('mfSubject').value.trim()||'学习';
    entry.book=(document.getElementById('mfBook')||{}).value.trim()||'';
    entry.duration=parseInt(document.getElementById('mfDur').value)||0;
    entry.note=(document.getElementById('mfNote')||{}).value||'';

function deleteEntry(){
  if(editIndex>=0){data[editType].splice(editIndex,1);persist();}
  closeModal();renderPage();

function saveAlarm(){
  var time=document.getElementById('maTime').value;
  var label=document.getElementById('maLabel').value.trim()||'提醒';

function setGoal(type){

// ALARM CHECK
var lastAlarmCheck={};
function checkAlarms(){
  var now=new Date();
  var ct=('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
  var dow=now.getDay();
  for(var i=0;i<data.alarms.length;i++){
    var a=data.alarms[i];
    if(!a.on||!a.days[dow])continue;
    if(a.time===ct&&!lastAlarmCheck[i+'_'+ct]){
      lastAlarmCheck[i+'_'+ct]=true;
      triggerAlarm(a);
    }
  }
  setTimeout(checkAlarms,15000); // 15秒检查一次
}

function triggerAlarm(a){
  // 系统通知
  if('Notification' in window && Notification.permission==='granted'){
    try{new Notification('⏰ Time for '+a.label+'!',{body:'Time for '+a.label+'! 💪 该行动了！',tag:'alarm'});}catch(e){}
  }
  // 页面内弹窗
  toast('⏰ Time for '+a.label+'!');
  // 震动
  if(navigator.vibrate)try{navigator.vibrate([200,100,200,100,500]);}catch(e){}
  // 播放提示音
  try{
    var ac=new AudioContext();
    var o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.frequency.value=880;g.gain.value=0.3;
    o.start();setTimeout(function(){o.stop();ac.close();},300);
  }catch(e){}
}

window.testAlarm=function(){
  var a={label:'测试闹钟',time:('0'+new Date().getHours()).slice(-2)+':'+('0'+new Date().getMinutes()).slice(-2)};
  triggerAlarm(a);
};

function spawnConfetti(){
  for(var i=0;i<30;i++){var c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'%';c.style.top='-10px';c.style.width=(6+Math.random()*8)+'px';c.style.height=(6+Math.random()*8)+'px';c.style.background=['#ffb020','#3b82f6','#ff3860','#4caf50','#60a5fa'][Math.floor(Math.random()*5)];c.style.borderRadius=Math.random()>.5?'50%':'2px';c.style.animationDelay=Math.random()*.5+'s';document.body.appendChild(c);setTimeout(function(){c.remove();},2000);}

  if(fits.length>0)for(var i=0;i<fits.length;i++){var e=fits[i];msg+='\n  · '+e.name+(e.bodyPart?' ('+e.bodyPart+')':'')+' '+e.duration+'分钟';}
  msg+='\n\n📚 学习: '+sMin+'分钟';
  if(studies.length>0)for(var i=0;i<studies.length;i++){var e=studies[i];msg+='\n  · '+e.subject+(e.book?' - '+e.book:'')+' '+e.duration+'分钟';}
  if(fits.length===0&&studies.length===0)msg+='\n\n😴 这天没有记录...';
  alert(msg);
};

  else if(currentPage==='motive')renderMotive();
  else if(currentPage==='records')renderRecords();
  else if(currentPage==='alarms')renderAlarms();
  renderNav();
}

// Service Worker (离线缓存)
if('serviceWorker' in navigator){
  var swCode='self.addEventListener("install",function(e){e.waitUntil(caches.open("v2").then(function(c){return c.addAll(["./"]);}))});self.addEventListener("fetch",function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request);}))});';
  var swBlob=new Blob([swCode],{type:'application/javascript'});
  var swUrl=URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(function(){});
}

// INIT
renderNav();
renderPage();

// Nav clicks
document.getElementById('nav').addEventListener('click',function(e){
  var item=e.target.closest('.nav-item');
  if(!item)return;
  currentPage=item.getAttribute('data-page');
  renderPage();
});

// 导出全局函数（必须在任何HTML onclick调用前完成）
window.openModal=openModal;
window.closeModal=closeModal;
window.saveEntry=saveEntry;
window.deleteEntry=deleteEntry;
window.selectBodyPart=selectBodyPart;
window.switchZTab=function(el){
  var tabs=document.querySelectorAll('.ztab');
  for(var i=0;i<tabs.length;i++){tabs[i].style.color='#555';tabs[i].style.borderBottomColor='transparent';tabs[i].classList.remove('active');}
  el.style.color='#3b82f6';el.style.borderBottomColor='#3b82f6';el.classList.add('active');
  var zt=el.getAttribute('data-zt');
  document.getElementById('zc-fitness').style.display=zt==='fitness'?'block':'none';
  document.getElementById('zc-study').style.display=zt==='study'?'block':'none';
};
window.setGoal=setGoal;
window.toggleAlarm=toggleAlarm;
window.saveAlarm=saveAlarm;
window.openAlarmModal=openAlarmModal;
window.editEntry=function(type,idx){openModal(type,idx);};

// 初始化
if('Notification' in window && Notification.permission==='default'){
  try{setTimeout(function(){Notification.requestPermission();},2000);}catch(e){}
}
try{checkAlarms();}catch(e){console.log('闹钟初始化失败',e);}

})();
</script>
</body>
</html>
